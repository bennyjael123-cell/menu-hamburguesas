<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Burger House - Menú</title>

<style>

body{
font-family: Arial;
margin:0;
background:#121212;
color:white;
}

header{
background:#ff3c00;
padding:20px;
text-align:center;
font-size:30px;
font-weight:bold;
}

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
padding:30px;
}

.card{
background:#1e1e1e;
width:250px;
border-radius:15px;
overflow:hidden;
box-shadow:0 0 10px black;
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
}

.card img{
width:100%;
height:160px;
object-fit:cover;
}

.card-content{
padding:15px;
}

.price{
color:#00ff88;
font-size:20px;
font-weight:bold;
}

button{
background:#ff3c00;
border:none;
padding:10px 20px;
color:white;
border-radius:8px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#ff2200;
}

.cart{
position:fixed;
right:0;
top:0;
width:300px;
height:100%;
background:#1a1a1a;
padding:20px;
box-shadow:-5px 0 10px black;
overflow:auto;
}

.cart h2{
text-align:center;
}

.cart-item{
margin:10px 0;
border-bottom:1px solid #444;
padding-bottom:5px;
}

.total{
font-size:22px;
color:#00ff88;
margin-top:20px;
}

</style>
</head>

<body>

<header>
🍔 BURGER HOUSE
</header>

<div class="container">

<div class="card">
<img src="https://images.unsplash.com/photo-1550547660-d9450f859349">
<div class="card-content">
<h3>Hamburguesa Clásica</h3>
<p>Carne, queso, lechuga y tomate</p>
<div class="price">$90</div>
<button onclick="addToCart('Clásica',90)">Agregar</button>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd">
<div class="card-content">
<h3>Doble BBQ</h3>
<p>Doble carne, tocino y salsa BBQ</p>
<div class="price">$130</div>
<button onclick="addToCart('Doble BBQ',130)">Agregar</button>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1606755962773-d324e0a13086">
<div class="card-content">
<h3>Monster Burger</h3>
<p>Triple carne con cheddar</p>
<div class="price">$160</div>
<button onclick="addToCart('Monster',160)">Agregar</button>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1594212699903-ec8a3eca50f5">
<div class="card-content">
<h3>Chicken Burger</h3>
<p>Pollo empanizado y mayonesa</p>
<div class="price">$100</div>
<button onclick="addToCart('Chicken',100)">Agregar</button>
</div>
</div>

</div>

<div class="cart">

<h2>🛒 Carrito</h2>

<div id="cart-items"></div>

<div class="total">
Total: $<span id="total">0</span>
</div>

<button onclick="checkout()">Ordenar</button>

</div>

<script>

let total = 0;

function addToCart(name,price){

let cart = document.getElementById("cart-items")

let item = document.createElement("div")

item.classList.add("cart-item")

item.innerHTML = name + " - $" + price

cart.appendChild(item)

total += price

document.getElementById("total").innerText = total

}

function checkout(){

alert("Pedido realizado 🍔 Total: $" + total)

}

</script>

</body>
</html>
